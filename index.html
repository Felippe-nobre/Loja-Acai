<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>RoxOut Açaí</title>
  <link rel="stylesheet" href="src/css/style.css">
  <link rel="icon" href="src/img/icon.png" type="image/png" sizes="32x32">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="inicio">

  <header class="text-center py-4 position-relative">
    <h1 class="titulo-principal">Boas Vindas à RoxOut Açaí!</h1>

    <!-- Botão de Status da Loja -->
    <button id="status-loja" type="button" class="btn" data-bs-toggle="modal" data-bs-target="#modalHorario">
  Verificando...
</button>

  </header>

  <main class="container-principal">

    <div class="lado-esquerdo">
      <img src="src/img/logo-açai.png" alt="Logo RoxOut" class="logo mb-3">
      <p class="mensagem">Aproveite nossos açaís incríveis</p>
    </div>
    <div class="lado-direito">
      <a href="cardapio.html" class="botao">Ver Cardápio</a>
      
    </div>
    

  </main>

  <footer class="text-center py-3">
    <small>&copy; 2025 RoxOut Açaí. Todos os direitos reservados.</small>
  </footer>
  <!-- Modal do Horário de Funcionamento -->
  <div class="modal fade" id="modalHorario" tabindex="-1" aria-labelledby="tituloModalHorario" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered"> 
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="tituloModalHorario">Horário de Funcionamento</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <p><strong>Terça a Domingo:</strong> 13h às 23h</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
        </div>
      </div>
    </div>
  </div>


  <!-- Bootstrap JS + Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="src/js/index.js"></script>

</body>

</html>
